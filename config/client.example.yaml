server:
  host: "orion-belt-server.example.com"
  port: 2222
  # Base URL of the gateway HTTP API (no trailing /api — paths already start with /api/v1)
  api_endpoint: "https://orion-belt-server.example.com"

auth:
  user: "alice" # gateway username (required for osh login / API auth)
  key_file: "~/.ssh/id_rsa"
  # known_hosts defaults to ~/.ssh/orion_known_hosts
  # strict_host_key_checking: ask (TOFU) | yes | no
  known_hosts: "~/.ssh/orion_known_hosts"
  strict_host_key_checking: "ask"
  # Trusted Host CA public key (authorized_keys-format line) — verifies the
  # gateway's host cert instead of TOFU/known_hosts. Get this from
  # `oadmin ca export` once the server has ssh_ca.enabled: true. Leave
  # empty to keep using TOFU/known_hosts as above.
  host_ca_public_key: ""
