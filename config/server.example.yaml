server:
  host: "0.0.0.0"
  port: 2222
  api_port: 8080
  ssh_host_key: "/etc/orion-belt/ssh_host_key"
  api_endpoint: "http://localhost:8080/api"
  metrics_enabled: true

database:
  driver: "postgres"
  connection_string: "postgres://orionbelt:password@localhost:5432/orionbelt?sslmode=disable"

auth:
  rebac_enabled: true
  allow_temp_access: true
  jwt_secret: "change-me-to-a-long-random-secret"
  jwt_expiry_hours: 24
  mfa_required: false
  # API requests per authenticated user (or IP) per minute. Default 600.
  rate_limit_per_minute: 600
  webauthn:
    enabled: true
    rp_display_name: "Orion Belt"
    rp_id: "localhost"
    origins:
      - "http://localhost:8080"
      - "https://localhost:8080"
  openfga:
    enabled: false
    api_url: "http://localhost:8081"
    store_id: "REPLACE_STORE_ID"
    model_id: ""
    api_token: ""
    relation: "can_access"
  # host_ca_public_key is a client/agent-side setting (see
  # config/client.example.yaml, config/agent.example.yaml) — the server
  # itself never verifies a host key, so it doesn't apply here.

# SSH Certificate Authority: short-lived signed SSH certs replacing static
# pubkey login (User CA), plus a Host CA certifying the gateway's own host
# key and each agent's identity. Both CA keypairs are generated
# automatically on first boot once enabled — see docs/SSH_CA.md.
ssh_ca:
  enabled: false
  # Encrypts the CA private key material at rest (32-byte, raw or base64).
  # Required whenever enabled is true — there is no plaintext fallback,
  # unlike recording.encryption_key: a leaked CA key lets an attacker mint
  # certs for any principal indefinitely, a categorically worse blast
  # radius than a leaked recording.
  master_key: ""
  user_cert_ttl_hours: 12       # default lifetime of an issued user cert
  max_user_cert_ttl_hours: 24   # cap on a caller-requested TTL
  host_cert_ttl_hours: 8760     # 1 year; gateway/agent certs auto-renew before this
  # Hostnames/IPs clients actually use to reach this gateway, embedded in
  # its own host cert. server.host above is often a bind-all address
  # (0.0.0.0) and not meaningful here. Defaults to [server.host] if empty.
  host_principals: []

recording:
  enabled: true
  storage_path: "/var/lib/orion-belt/recordings"
  retention_days: 90
  # 32-byte key (raw or base64). Leave empty to store plaintext.
  encryption_key: ""

plugins:
  audit-logger:
    log_path: "/var/log/orion-belt/audit.log"

  slack-notifications:
    webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK"
    channel: "#security"
    enabled: true

  email-notifications:
    smtp_host: "smtp.example.com"
    smtp_port: 587
    username: "orion"
    password: "secret"
    from: "orion-belt@example.com"
    to:
      - "admins@example.com"
    enabled: false

  webhook-notifications:
    url: "https://hooks.example.com/orion-belt"
    enabled: false
