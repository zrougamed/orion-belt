<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orion Belt — Privileged Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <style>
    :root {
      --bg-deep: #0a1214;
      --bg: #0e181c;
      --bg-elev: #152226;
      --bg-panel: #1a2a30;
      --bg-hover: #213438;
      --line: #2a3f46;
      --line-soft: rgba(42, 63, 70, 0.55);
      --text: #e8f0f2;
      --muted: #8aa0a8;
      --faint: #5e747c;
      --accent: #e8a54b;
      --accent-soft: rgba(232, 165, 75, 0.14);
      --accent-glow: rgba(232, 165, 75, 0.28);
      --teal: #2dd4bf;
      --teal-dim: #0f766e;
      --ok: #34d399;
      --warn: #fbbf24;
      --danger: #f87171;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      --font: "Instrument Sans", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
      --nav-w: 240px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background-color: var(--bg-deep);
      background-image:
        linear-gradient(rgba(45, 212, 191, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45, 212, 191, 0.03) 1px, transparent 1px),
        radial-gradient(1100px 700px at 8% -15%, rgba(15, 118, 110, 0.35), transparent 55%),
        radial-gradient(900px 500px at 100% 0%, rgba(232, 165, 75, 0.08), transparent 50%),
        radial-gradient(800px 600px at 50% 120%, rgba(14, 24, 28, 0.9), transparent 60%),
        var(--bg);
      background-size: 48px 48px, 48px 48px, auto, auto, auto, auto;
      -webkit-font-smoothing: antialiased;
    }
    button, input, textarea, select { font: inherit; color: inherit; }
    a { color: var(--accent); }
    .hidden { display: none !important; }
    .mono { font-family: var(--mono); font-size: 0.84rem; }
    .muted { color: var(--muted); }
    .err { color: var(--danger); margin: 0.5rem 0; }
    .okmsg { color: var(--ok); margin: 0.5rem 0; }

    /* ── Login ── */
    .login-stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
      position: relative;
      overflow: hidden;
    }
    .login-stage::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 30% 40%, rgba(15, 118, 110, 0.22), transparent 42%),
        radial-gradient(circle at 70% 60%, rgba(232, 165, 75, 0.1), transparent 40%);
      animation: drift 18s var(--ease) infinite alternate;
      pointer-events: none;
    }
    @keyframes drift {
      from { transform: translate3d(-2%, -1%, 0) scale(1); }
      to { transform: translate3d(2%, 2%, 0) scale(1.05); }
    }
    .login-compose {
      position: relative;
      z-index: 1;
      width: min(440px, 100%);
      text-align: center;
    }
    .login-brand {
      font-size: clamp(2.6rem, 7vw, 3.4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 0 0 0.75rem;
    }
    .login-brand em {
      font-style: normal;
      color: var(--accent);
      text-shadow: 0 0 40px var(--accent-glow);
    }
    .login-tag {
      margin: 0 0 2rem;
      color: var(--muted);
      font-size: 1.05rem;
      letter-spacing: 0.01em;
    }
    .login-panel {
      text-align: left;
      background: rgba(21, 34, 38, 0.82);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 4px);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
    }
    .login-panel:focus-within {
      border-color: rgba(232, 165, 75, 0.45);
      box-shadow: var(--shadow), 0 0 0 3px var(--accent-soft);
    }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.1rem 0;
      color: var(--faint);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .login-divider::before, .login-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    /* ── Shell ── */
    .shell {
      display: grid;
      grid-template-columns: var(--nav-w) 1fr;
      min-height: 100vh;
    }
    nav.side {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding: 1.25rem 0.85rem;
      background: rgba(10, 18, 20, 0.88);
      border-right: 1px solid var(--line-soft);
      backdrop-filter: blur(12px);
      overflow-y: auto;
    }
    .nav-brand {
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      padding: 0.35rem 0.65rem 1.1rem;
      margin-bottom: 0.35rem;
      border-bottom: 1px solid var(--line-soft);
    }
    .nav-brand span { color: var(--accent); }
    .nav-section {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--faint);
      padding: 0.85rem 0.65rem 0.35rem;
    }
    nav.side button.nav-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      width: 100%;
      text-align: left;
      background: transparent;
      border: 0;
      color: var(--muted);
      padding: 0.62rem 0.75rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.18s var(--ease), color 0.18s var(--ease), transform 0.18s var(--ease);
    }
    nav.side button.nav-item:hover {
      background: var(--bg-hover);
      color: var(--text);
    }
    nav.side button.nav-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      box-shadow: inset 2px 0 0 var(--accent);
    }
    .nav-ico {
      width: 1.1rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.75rem;
      opacity: 0.85;
    }
    .nav-foot {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--line-soft);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .who {
      padding: 0.35rem 0.65rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .who strong { color: var(--text); font-weight: 600; }
    .role-pill {
      display: inline-block;
      margin-left: 0.35rem;
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(45, 212, 191, 0.12);
      color: var(--teal);
    }

    main.workspace {
      padding: 1.75rem 2rem 2.5rem;
      min-width: 0;
    }
    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .page-head h1 {
      margin: 0;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .page-head p {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .card {
      background: rgba(21, 34, 38, 0.78);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 1.15rem 1.25rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s var(--ease);
    }
    .card:hover { border-color: rgba(45, 212, 191, 0.22); }
    .card h3 { margin: 0 0 0.85rem; font-size: 0.95rem; font-weight: 600; }
    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
    .stat {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .stat-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 0.7rem 0.55rem;
      border-bottom: 1px solid var(--line-soft);
      vertical-align: middle;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    tr:hover td { background: rgba(255, 255, 255, 0.015); }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .badge.ok { background: rgba(52, 211, 153, 0.14); color: var(--ok); }
    .badge.warn { background: rgba(251, 191, 36, 0.14); color: var(--warn); }
    .badge.danger { background: rgba(248, 113, 113, 0.14); color: var(--danger); }
    .badge.neutral { background: rgba(138, 160, 168, 0.14); color: var(--muted); }

    label.field {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0.15rem 0 0.35rem;
    }
    input, textarea, select {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 0.65rem 0.75rem;
      margin: 0 0 0.85rem;
      transition: border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: rgba(232, 165, 75, 0.55);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    textarea { resize: vertical; min-height: 4.5rem; font-family: var(--mono); font-size: 0.82rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      background: var(--accent);
      color: #1a1208;
      border: 0;
      border-radius: var(--radius-sm);
      padding: 0.62rem 1.05rem;
      font-weight: 650;
      cursor: pointer;
      transition: transform 0.15s var(--ease), filter 0.15s var(--ease), background 0.15s var(--ease);
    }
    .btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; filter: none; }
    .btn.secondary {
      background: var(--bg-panel);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .btn.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
    }
    .btn.ghost:hover { color: var(--text); border-color: var(--line); background: var(--bg-hover); }
    .btn.danger { background: var(--danger); color: #2a0a0a; }
    .btn.teal { background: var(--teal); color: #04201c; }
    .btn.block { width: 100%; }
    .btn.sm { padding: 0.4rem 0.7rem; font-size: 0.82rem; }

    .row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .stack { display: flex; flex-direction: column; gap: 0.75rem; }
    .split-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
    }
    @media (max-width: 720px) {
      .split-2 { grid-template-columns: 1fr; }
    }

    pre.session, pre.code {
      background: #070d0f;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 1rem;
      max-height: 420px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.45;
      margin: 0.75rem 0 0;
    }
    .playback-panel {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--line-soft);
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.75rem;
      margin-bottom: 0.85rem;
    }
    .meta-chip {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Terminal */
    .term-toolbar {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 0.85rem;
    }
    .term-toolbar .field-wrap { flex: 1; min-width: 140px; }
    .term-toolbar label.field { margin-bottom: 0.3rem; }
    .term-toolbar input, .term-toolbar select { margin-bottom: 0; }
    .term-frame {
      background: #05090b;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 420px;
      box-shadow: inset 0 0 0 1px rgba(45, 212, 191, 0.05);
    }
    .term-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0.85rem;
      background: rgba(21, 34, 38, 0.95);
      border-bottom: 1px solid var(--line-soft);
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--mono);
    }
    .dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      display: inline-block;
      margin-right: 0.4rem;
      background: var(--faint);
    }
    .dot.live { background: var(--ok); box-shadow: 0 0 8px rgba(52, 211, 153, 0.55); }
    .dot.off { background: var(--danger); }
    #xtermHost { height: 480px; padding: 0.35rem; }

    /* Files */
    .path-bar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 0.85rem;
    }
    .path-bar input { margin: 0; flex: 1; min-width: 160px; }
    .file-row-name { cursor: pointer; color: var(--text); }
    .file-row-name:hover { color: var(--accent); }
    .file-row-name.dir { font-weight: 600; }

    .toast {
      position: fixed;
      right: 1.25rem;
      bottom: 1.25rem;
      z-index: 50;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      box-shadow: var(--shadow);
      max-width: min(360px, calc(100vw - 2rem));
      transform: translateY(120%);
      opacity: 0;
      transition: transform 0.3s var(--ease), opacity 0.3s var(--ease);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-color: rgba(248, 113, 113, 0.45); }
    .toast.ok { border-color: rgba(52, 211, 153, 0.45); }

    .tabs {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 0.35rem;
    }
    .tabs button {
      background: transparent;
      border: 0;
      color: var(--muted);
      padding: 0.5rem 0.85rem;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .tabs button.active {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .empty {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      nav.side {
        position: relative;
        height: auto;
        flex-direction: row;
        flex-wrap: wrap;
        border-right: 0;
        border-bottom: 1px solid var(--line-soft);
      }
      .nav-brand, .nav-section, .nav-foot { width: 100%; }
      .nav-foot { margin-top: 0.5rem; }
      main.workspace { padding: 1.25rem; }
    }
  </style>
</head>
<body>
  <div id="loginView" class="login-stage">
    <div class="login-compose">
      <h1 class="login-brand">Orion <em>Belt</em></h1>
      <p class="login-tag">Privileged access management for operators who ship.</p>
      <div class="login-panel">
        <label class="field" for="loginUser">Username</label>
        <input id="loginUser" autocomplete="username" spellcheck="false" />
        <label class="field" for="loginKey">SSH public key</label>
        <textarea id="loginKey" rows="3" placeholder="ssh-ed25519 AAAA… comment" spellcheck="false"></textarea>
        <label class="field" for="loginTotp">TOTP / backup code <span class="muted">(optional)</span></label>
        <input id="loginTotp" autocomplete="one-time-code" placeholder="123456" />
        <div id="loginErr" class="err"></div>
        <button class="btn block" id="loginBtn" type="button">Sign in</button>
        <div class="login-divider">or</div>
        <button class="btn secondary block" id="webauthnLoginBtn" type="button">Sign in with YubiKey / FIDO2</button>
      </div>
    </div>
  </div>

  <div id="appView" class="shell hidden">
    <nav class="side" id="sideNav"></nav>
    <main class="workspace">
      <div id="view"></div>
    </main>
  </div>

  <div id="toast" class="toast" role="status"></div>

<script>
(function () {
  "use strict";

  const NAV = {
    admin: [
      { id: "dashboard", label: "Dashboard", ico: "◆" },
      { id: "setup", label: "Setup guide", ico: "?" },
      { id: "requests", label: "Access requests", ico: "◇" },
      { id: "machines", label: "Machines", ico: "▣" },
      { id: "terminal", label: "Terminal", ico: "▸" },
      { id: "files", label: "Files", ico: "▤" },
      { id: "sessions", label: "Sessions", ico: "◎" },
      { id: "users", label: "Users", ico: "○" },
      { id: "agents", label: "Agents", ico: "⚡" },
      { id: "audit", label: "Audit", ico: "≡" },
      { id: "security", label: "Security", ico: "✦" },
    ],
    operator: [
      { id: "dashboard", label: "Dashboard", ico: "◆" },
      { id: "setup", label: "Setup guide", ico: "?" },
      { id: "requests", label: "Access requests", ico: "◇" },
      { id: "machines", label: "Machines", ico: "▣" },
      { id: "terminal", label: "Terminal", ico: "▸" },
      { id: "files", label: "Files", ico: "▤" },
      { id: "sessions", label: "Sessions", ico: "◎" },
      { id: "users", label: "Users", ico: "○" },
      { id: "agents", label: "Agents", ico: "⚡" },
      { id: "audit", label: "Audit", ico: "≡" },
      { id: "security", label: "Security", ico: "✦" },
    ],
    auditor: [
      { id: "dashboard", label: "Dashboard", ico: "◆" },
      { id: "sessions", label: "Sessions", ico: "◎" },
      { id: "users", label: "Users", ico: "○" },
      { id: "audit", label: "Audit", ico: "≡" },
      { id: "security", label: "Security", ico: "✦" },
    ],
    user: [
      { id: "machines", label: "Machines", ico: "▣" },
      { id: "terminal", label: "Terminal", ico: "▸" },
      { id: "files", label: "Files", ico: "▤" },
      { id: "sessions", label: "Sessions", ico: "◎" },
      { id: "requests", label: "Access requests", ico: "◇" },
      { id: "audit", label: "Audit", ico: "≡" },
      { id: "security", label: "Security", ico: "✦" },
    ],
  };

  const REMOTE_USERS = ["root", "ubuntu", "ec2-user", "admin", "deploy"];

  const state = {
    token: localStorage.getItem("ob_session") || "",
    jwt: localStorage.getItem("ob_jwt") || "",
    user: JSON.parse(localStorage.getItem("ob_user") || "null"),
    view: "dashboard",
    term: { ws: null, xterm: null, fit: null, connected: false },
    files: { machine: "", user: "root", path: "/" },
    secTab: "mfa",
    sessionFilter: "all",
  };

  function roleOf(user) {
    if (!user) return "user";
    if (user.role) return user.role;
    if (user.is_admin) return "admin";
    return "user";
  }

  function canApprove() {
    const r = roleOf(state.user);
    return r === "admin" || r === "operator";
  }

  function defaultViewForRole(role) {
    const items = NAV[role] || NAV.user;
    return items[0].id;
  }

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function shortId(id) {
    return (id || "").slice(0, 8) || "—";
  }

  function fmtTime(t) {
    if (!t) return "—";
    try {
      return new Date(t).toLocaleString();
    } catch {
      return String(t);
    }
  }

  function badge(status) {
    const s = String(status || "").toLowerCase();
    let cls = "warn";
    if (["approved", "active", "completed", "healthy", "enabled", "online", "ok"].includes(s)) cls = "ok";
    if (["rejected", "denied", "failed", "offline", "expired", "terminated"].includes(s)) cls = "danger";
    if (["off", "inactive", "-"].includes(s)) cls = "neutral";
    return `<span class="badge ${cls}">${esc(status || "—")}</span>`;
  }

  function toast(msg, kind) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "toast show " + (kind || "");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { el.className = "toast"; }, 3200);
  }

  function setSessionCookie(token) {
    if (!token) {
      document.cookie = "session_token=; path=/; Max-Age=0; SameSite=Lax";
      return;
    }
    document.cookie = "session_token=" + encodeURIComponent(token) + "; path=/; SameSite=Lax";
  }

  function persistAuth() {
    if (state.token) localStorage.setItem("ob_session", state.token);
    else localStorage.removeItem("ob_session");
    if (state.jwt) localStorage.setItem("ob_jwt", state.jwt);
    else localStorage.removeItem("ob_jwt");
    if (state.user) localStorage.setItem("ob_user", JSON.stringify(state.user));
    else localStorage.removeItem("ob_user");
    setSessionCookie(state.token);
  }

  function clearAuth() {
    state.token = "";
    state.jwt = "";
    state.user = null;
    persistAuth();
  }

  async function api(path, opts) {
    opts = opts || {};
    const headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
    if (state.token) headers["X-Session-Token"] = state.token;
    if (state.jwt && !headers.Authorization) headers.Authorization = "Bearer " + state.jwt;
    const fetchOpts = Object.assign({}, opts, { headers });
    if (opts.body instanceof FormData) {
      delete headers["Content-Type"];
    }
    const res = await fetch("/api/v1" + path, fetchOpts);
    const text = await res.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
    if (!res.ok) {
      const err = new Error((data && (data.error || data.message)) || res.statusText || "request failed");
      err.status = res.status;
      err.data = data;
      throw err;
    }
    return data;
  }

  async function apiRaw(path, opts) {
    opts = opts || {};
    const headers = Object.assign({}, opts.headers || {});
    if (state.token) headers["X-Session-Token"] = state.token;
    if (state.jwt && !headers.Authorization) headers.Authorization = "Bearer " + state.jwt;
    return fetch("/api/v1" + path, Object.assign({}, opts, { headers }));
  }

  /* ── WebAuthn helpers ── */
  function b64urlToBuf(s) {
    const pad = "=".repeat((4 - (s.length % 4)) % 4);
    const b64 = (s + pad).replace(/-/g, "+").replace(/_/g, "/");
    const raw = atob(b64);
    const buf = new ArrayBuffer(raw.length);
    const view = new Uint8Array(buf);
    for (let i = 0; i < raw.length; i++) view[i] = raw.charCodeAt(i);
    return buf;
  }

  function bufToB64url(buf) {
    const bytes = buf instanceof ArrayBuffer ? new Uint8Array(buf) : new Uint8Array(buf.buffer || buf);
    let str = "";
    for (let i = 0; i < bytes.length; i++) str += String.fromCharCode(bytes[i]);
    return btoa(str).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  function publicKeyCredentialToJSON(cred) {
    if (!cred) return null;
    const out = {
      id: cred.id,
      type: cred.type,
      rawId: bufToB64url(cred.rawId),
    };
    if (cred.response) {
      const r = cred.response;
      out.response = {};
      if (r.clientDataJSON) out.response.clientDataJSON = bufToB64url(r.clientDataJSON);
      if (r.attestationObject) out.response.attestationObject = bufToB64url(r.attestationObject);
      if (r.authenticatorData) out.response.authenticatorData = bufToB64url(r.authenticatorData);
      if (r.signature) out.response.signature = bufToB64url(r.signature);
      if (r.userHandle) out.response.userHandle = bufToB64url(r.userHandle);
    }
    if (cred.authenticatorAttachment) out.authenticatorAttachment = cred.authenticatorAttachment;
    if (cred.getClientExtensionResults) out.clientExtensionResults = cred.getClientExtensionResults();
    return out;
  }

  function preparePublicKeyOptions(publicKey) {
    const pk = Object.assign({}, publicKey);
    if (typeof pk.challenge === "string") pk.challenge = b64urlToBuf(pk.challenge);
    if (pk.user && typeof pk.user.id === "string") {
      pk.user = Object.assign({}, pk.user, { id: b64urlToBuf(pk.user.id) });
    }
    if (Array.isArray(pk.excludeCredentials)) {
      pk.excludeCredentials = pk.excludeCredentials.map((c) =>
        Object.assign({}, c, { id: typeof c.id === "string" ? b64urlToBuf(c.id) : c.id })
      );
    }
    if (Array.isArray(pk.allowCredentials)) {
      pk.allowCredentials = pk.allowCredentials.map((c) =>
        Object.assign({}, c, { id: typeof c.id === "string" ? b64urlToBuf(c.id) : c.id })
      );
    }
    return pk;
  }

  function applyLogin(data) {
    state.token = data.session_token;
    state.user = data.user || state.user;
    if (data.access_token) state.jwt = data.access_token;
    persistAuth();
  }

  async function refreshMe() {
    const me = await api("/auth/me");
    state.user = me;
    localStorage.setItem("ob_user", JSON.stringify(me));
    return me;
  }

  function showLogin() {
    disconnectTerminal();
    document.getElementById("appView").classList.add("hidden");
    document.getElementById("loginView").classList.remove("hidden");
  }

  function showApp() {
    document.getElementById("loginView").classList.add("hidden");
    document.getElementById("appView").classList.remove("hidden");
    const role = roleOf(state.user);
    const allowed = (NAV[role] || NAV.user).map((n) => n.id);
    if (!allowed.includes(state.view)) state.view = defaultViewForRole(role);
    buildNav();
    render();
  }

  function buildNav() {
    const role = roleOf(state.user);
    const items = NAV[role] || NAV.user;
    const nav = document.getElementById("sideNav");
    nav.innerHTML = `
      <div class="nav-brand">Orion <span>Belt</span></div>
      <div class="nav-section">Console</div>
      ${items.map((n) => `
        <button type="button" class="nav-item ${state.view === n.id ? "active" : ""}" data-view="${n.id}">
          <span class="nav-ico">${n.ico}</span>${esc(n.label)}
        </button>`).join("")}
      <div class="nav-foot">
        <div class="who">
          <strong>${esc(state.user && state.user.username)}</strong>
          <span class="role-pill">${esc(role)}</span>
          <div class="muted" style="margin-top:.2rem;font-size:.75rem">${esc(state.user && state.user.email)}</div>
        </div>
        <button type="button" class="btn secondary sm" id="logoutBtn">Sign out</button>
      </div>`;
    nav.querySelectorAll("button.nav-item").forEach((btn) => {
      btn.onclick = () => {
        if (state.view === "terminal" && btn.dataset.view !== "terminal") disconnectTerminal();
        state.view = btn.dataset.view;
        buildNav();
        render();
      };
    });
    document.getElementById("logoutBtn").onclick = async () => {
      try { await api("/logout", { method: "POST", body: "{}" }); } catch (_) { /* ignore */ }
      clearAuth();
      showLogin();
    };
  }

  /* ── Login handlers ── */
  document.getElementById("loginBtn").onclick = async () => {
    const errEl = document.getElementById("loginErr");
    errEl.textContent = "";
    try {
      const body = {
        username: document.getElementById("loginUser").value.trim(),
        public_key: document.getElementById("loginKey").value.trim(),
        totp_code: document.getElementById("loginTotp").value.trim(),
      };
      const data = await api("/public/login", { method: "POST", body: JSON.stringify(body) });
      applyLogin(data);
      await refreshMe();
      state.view = defaultViewForRole(roleOf(state.user));
      showApp();
    } catch (e) {
      if (e.data && e.data.mfa_required) errEl.textContent = "MFA code required.";
      else if (e.data && e.data.mfa_enrollment_required) errEl.textContent = "MFA enrollment required before login.";
      else errEl.textContent = e.message || "Login failed";
    }
  };

  document.getElementById("webauthnLoginBtn").onclick = async () => {
    const errEl = document.getElementById("loginErr");
    errEl.textContent = "";
    const username = document.getElementById("loginUser").value.trim();
    if (!username) {
      errEl.textContent = "Enter your username, then use YubiKey / FIDO2.";
      return;
    }
    try {
      const begin = await api("/public/webauthn/login/begin", {
        method: "POST",
        body: JSON.stringify({ username }),
      });
      const publicKey = preparePublicKeyOptions(begin.publicKey || begin);
      const cred = await navigator.credentials.get({ publicKey });
      const data = await api("/public/webauthn/login/finish", {
        method: "POST",
        body: JSON.stringify({
          username,
          response: publicKeyCredentialToJSON(cred),
        }),
      });
      applyLogin(data);
      await refreshMe();
      state.view = defaultViewForRole(roleOf(state.user));
      showApp();
    } catch (e) {
      errEl.textContent = e.message || "WebAuthn login failed";
    }
  };

  /* ── Render dispatcher ── */
  async function render() {
    const root = document.getElementById("view");
    root.innerHTML = `<p class="muted">Loading…</p>`;
    try {
      const map = {
        dashboard: renderDashboard,
        setup: renderSetup,
        requests: renderRequests,
        machines: renderMachines,
        terminal: renderTerminal,
        files: renderFiles,
        sessions: renderSessions,
        users: renderUsers,
        agents: renderAgents,
        audit: renderAudit,
        security: renderSecurity,
      };
      const fn = map[state.view];
      if (!fn) {
        root.innerHTML = `<div class="err">Unknown view</div>`;
        return;
      }
      await fn(root);
    } catch (e) {
      if (e.status === 401) {
        clearAuth();
        showLogin();
        return;
      }
      root.innerHTML = `<div class="card"><div class="err">${esc(e.message)}</div></div>`;
    }
  }

  /* ── Dashboard ── */
  async function renderDashboard(root) {
    const role = roleOf(state.user);
    let machines = [], sessions = [], pending = [], setup = null;
    try { machines = (await api("/machines")) || []; } catch (_) { machines = []; }
    try { sessions = (await api("/sessions/active")) || []; } catch (_) { sessions = []; }
    try { pending = (await api("/access-requests/pending")) || []; } catch (_) { pending = []; }
    if (role === "admin" || role === "operator") {
      try { setup = await api("/setup/status"); } catch (_) { setup = null; }
    }

    const setupBanner = setup && !setup.complete ? `
      <div class="card" style="border-color: var(--accent); background: var(--accent-soft)">
        <h3>Finish setup</h3>
        <p class="muted" style="margin:0 0 0.75rem">${esc(setup.next || "")}</p>
        <button type="button" class="btn primary" data-goto-setup>Open setup guide</button>
      </div>` : "";

    root.innerHTML = `
      <div class="page-head">
        <div>
          <h1>Dashboard</h1>
          <p>Live posture across machines, sessions, and access.</p>
        </div>
      </div>
      ${setupBanner}
      <div class="grid">
        <div class="card"><div class="stat-label">Machines</div><div class="stat">${machines.length}</div></div>
        <div class="card"><div class="stat-label">Active sessions</div><div class="stat">${sessions.length}</div></div>
        <div class="card"><div class="stat-label">Pending requests</div><div class="stat">${pending.length}</div></div>
        <div class="card"><div class="stat-label">Role</div><div class="stat" style="font-size:1.25rem;text-transform:capitalize">${esc(role)}</div></div>
      </div>
      <div class="card">
        <h3>Pending access</h3>
        ${requestTable(pending, canApprove())}
      </div>
      <div class="card">
        <h3>Active sessions</h3>
        ${sessionMiniTable(sessions)}
      </div>`;
    bindRequestActions(root);
    const go = root.querySelector("[data-goto-setup]");
    if (go) go.onclick = () => { state.view = "setup"; buildNav(); render(); };
  }

  /* ── Setup guide ── */
  async function renderSetup(root) {
    let setup = { steps: {}, counts: {}, next: "", complete: false };
    try { setup = await api("/setup/status"); } catch (e) {
      root.innerHTML = `<div class="card"><div class="err">${esc(e.message)}</div></div>`;
      return;
    }
    const s = setup.steps || {};
    const c = setup.counts || {};
    const row = (ok, title, detail) => `
      <div style="display:flex;gap:0.75rem;align-items:flex-start;padding:0.65rem 0;border-bottom:1px solid var(--line-soft)">
        <span style="color:${ok ? "var(--ok)" : "var(--warn)"};font-weight:600">${ok ? "✓" : "○"}</span>
        <div><strong>${esc(title)}</strong><div class="muted" style="margin-top:0.2rem">${detail}</div></div>
      </div>`;

    root.innerHTML = `
      <div class="page-head">
        <div>
          <h1>Setup guide</h1>
          <p>Checklist to get agents, users, and access working.</p>
        </div>
      </div>
      <div class="card">
        <p style="margin-top:0">${setup.complete
          ? `<span class="okmsg">Core setup looks complete.</span>`
          : `<span class="muted">Next:</span> <strong>${esc(setup.next || "")}</strong>`}</p>
        ${row(!!s.admin_exists, "Admin account", `${c.admins || 0} admin(s)`)}
        ${row(!!s.has_machines, "Machines registered", `${c.machines || 0} machine(s)`)}
        ${row(!!s.has_connected_agents, "Agents connected", `${c.connected_agents || 0} online`)}
        ${row(!!s.has_users, "Non-admin users", `${c.users || 0} user(s)`)}
        ${row(!!s.has_permissions, "Machine grants", `${c.permissions || 0} permission(s)`)}
      </div>
      <div class="card">
        <h3>1. Admin</h3>
        <p class="muted">CLI: <code class="mono">orion-belt-server setup</code> or
        <code class="mono">orion-belt-server user create --admin …</code></p>
        <h3>2. Agents</h3>
        <p class="muted">Install <code class="mono">orion-belt-agent</code> on targets, point
        <code class="mono">agent.yaml</code> at this gateway (:2222), enable the service, then register

        <h3>3. Users &amp; grants</h3>
        <p class="muted">Create users under Users, then grant machine access with allowed
        <code class="mono">remote_users</code> (e.g. root). Sessions (SSH gateway + web terminal) are recorded automatically.</p>
        <h3>4. Connect</h3>
        <p class="muted mono">ssh -i key -p 2222 user+machine@gateway</p>
        <p class="muted">Or use Terminal in this UI — those sessions appear under Sessions too.</p>
      </div>`;
  }

  /* ── Machines ── */

  function sessionMiniTable(rows) {
    if (!rows.length) return `<div class="empty">No active sessions.</div>`;
    return `<table><thead><tr><th>ID</th><th>User</th><th>Machine</th><th>Remote</th><th>Status</th></tr></thead>
      <tbody>${rows.map((s) => `<tr>
        <td class="mono">${esc(shortId(s.id))}</td>
        <td class="mono">${esc(s.user_id)}</td>
        <td class="mono">${esc(s.machine_id)}</td>
        <td class="mono">${esc(s.remote_user || "—")}</td>
        <td>${badge(s.status)}</td>
      </tr>`).join("")}</tbody></table>`;
  }

  /* ── Access requests ── */
  function requestTable(rows, withActions) {
    if (!rows || !rows.length) return `<div class="empty">No pending requests.</div>`;
    return `<table><thead><tr>
      <th>ID</th><th>User</th><th>Machine</th><th>Remote users</th><th>Reason</th><th>Duration</th><th>Status</th>
      ${withActions ? "<th></th>" : ""}
    </tr></thead><tbody>${rows.map((r) => `<tr>
      <td class="mono">${esc(shortId(r.id))}</td>
      <td class="mono">${esc(r.user_id)}</td>
      <td class="mono">${esc(r.machine_id)}</td>
      <td class="mono">${esc((r.remote_users || []).join(", ") || "—")}</td>
      <td>${esc(r.reason || "")}</td>
      <td class="mono">${r.duration != null ? Math.round(r.duration / 60) + "m" : "—"}</td>
      <td>${badge(r.status)}</td>
      ${withActions ? `<td class="row">
        ${r.status === "pending" ? `
          <button type="button" class="btn sm" data-approve="${esc(r.id)}">Approve</button>
          <button type="button" class="btn danger sm" data-reject="${esc(r.id)}">Reject</button>` : ""}
      </td>` : ""}
    </tr>`).join("")}</tbody></table>`;
  }

  function bindRequestActions(root) {
    root.querySelectorAll("[data-approve]").forEach((btn) => {
      btn.onclick = async () => {
        try {
          await api(`/admin/access-requests/${btn.dataset.approve}/approve`, {
            method: "POST",
            body: JSON.stringify({ reviewer_id: state.user.id }),
          });
          toast("Request approved", "ok");
          render();
        } catch (e) { toast(e.message, "error"); }
      };
    });
    root.querySelectorAll("[data-reject]").forEach((btn) => {
      btn.onclick = async () => {
        try {
          await api(`/admin/access-requests/${btn.dataset.reject}/reject`, {
            method: "POST",
            body: JSON.stringify({ reviewer_id: state.user.id }),
          });
          toast("Request rejected", "ok");
          render();
        } catch (e) { toast(e.message, "error"); }
      };
    });
  }

    const approve = canApprove();

    try { pending = (await api("/access-requests/pending")) || []; } catch (_) { pending = []; }

    root.innerHTML = `
      <div class="page-head">
        <div>
          <h1>Access requests</h1>
          <p>${approve ? "Review and approve temporary machine access." : "Request temporary access to machines."}</p>

      ${!approve ? `

            <input id="reqMachine" placeholder="machine-id" />

  /* ── Terminal ── */
  function disconnectTerminal() {
    if (state.term._onResize) {
      window.removeEventListener("resize", state.term._onResize);
      state.term._onResize = null;
    }
    if (state.term.ws) {
      try { state.term.ws.close(); } catch (_) { /* ignore */ }
      state.term.ws = null;
    }
    if (state.term.xterm) {
      try { state.term.xterm.dispose(); } catch (_) { /* ignore */ }
      state.term.xterm = null;
      state.term.fit = null;
    }
    state.term.connected = false;
  }

  async function renderTerminal(root) {
    let machines = [];
    try { machines = (await api("/machines")) || []; } catch (_) { machines = []; }
    const pre = state._preMachine || (machines[0] && machines[0].name) || "";
    state._preMachine = null;

    root.innerHTML = `
      <div class="page-head">
        <div>
          <h1>Terminal</h1>
          <p>Interactive shell over the Orion Belt gateway.</p>
        </div>
      </div>
      <div class="card" style="padding-bottom:.85rem">
        <div class="term-toolbar">
          <div class="field-wrap">
            <label class="field">Machine</label>
            <select id="termMachine">
              ${machines.map((m) => `<option value="${esc(m.name)}" ${m.name === pre ? "selected" : ""}>${esc(m.name)} (${esc(m.hostname)})</option>`).join("")}
              ${!machines.length ? `<option value="">No machines</option>` : ""}

          </div>

          <button type="button" class="btn secondary" id="termDisconnect" disabled>Disconnect</button>
        </div>
        <div class="term-frame">
          <div class="term-status">
            <span><span class="dot off" id="termDot"></span><span id="termStatusText">disconnected</span></span>
            <span id="termMeta">—</span>
          </div>
          <div id="xtermHost"></div>
        </div>
      </div>`;

    const host = document.getElementById("xtermHost");
    const term = new Terminal({
      cursorBlink: true,
      fontFamily: '"JetBrains Mono", ui-monospace, monospace',
      fontSize: 13,
      theme: {
        background: "#05090b",
        foreground: "#e8f0f2",
        cursor: "#e8a54b",
        selectionBackground: "rgba(232,165,75,0.3)",
        black: "#0a1214",
        brightBlack: "#5e747c",
        red: "#f87171",
        green: "#34d399",
        yellow: "#fbbf24",
        blue: "#38bdf8",
        magenta: "#c084fc",
        cyan: "#2dd4bf",
        white: "#e8f0f2",
      },
    });
    let fitAddon = null;
    try {
      const FitCtor = (typeof FitAddon !== "undefined" && (FitAddon.FitAddon || FitAddon))
        || (window.FitAddon && (window.FitAddon.FitAddon || window.FitAddon));
      if (typeof FitCtor === "function") {
        fitAddon = new FitCtor();
        term.loadAddon(fitAddon);
      }
    } catch (_) { /* fit optional */ }
    term.open(host);
    if (fitAddon) {
      try { fitAddon.fit(); } catch (_) { /* ignore */ }
    }
    state.term.xterm = term;
    state.term.fit = fitAddon;

    term.onData((data) => {
      const ws = state.term.ws;
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(data);
    });

    const setStatus = (live, text) => {
      document.getElementById("termDot").className = "dot " + (live ? "live" : "off");
      document.getElementById("termStatusText").textContent = text;
      document.getElementById("termConnect").disabled = live;
      document.getElementById("termDisconnect").disabled = !live;
    };

    const onResize = () => {
      if (fitAddon) {
        try { fitAddon.fit(); } catch (_) { /* ignore */ }
      }
      if (state.term.ws && state.term.ws.readyState === WebSocket.OPEN && term.cols && term.rows) {
        state.term.ws.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
      }
    };
    window.addEventListener("resize", onResize);
    state.term._onResize = onResize;

    document.getElementById("termConnect").onclick = () => {
      const machine = document.getElementById("termMachine").value.trim();
      const user = document.getElementById("termUser").value.trim() || "root";
      if (!machine) { toast("Select a machine", "error"); return; }
      if (state.term.ws) {
        try { state.term.ws.close(); } catch (_) { /* ignore */ }
        state.term.ws = null;
      }

      const proto = location.protocol === "https:" ? "wss" : "ws";
      const qs = new URLSearchParams({
        machine,
        user,
        token: state.token || "",
      });
      // Cookie session_token (set at login) authenticates Gin middleware for same-origin WS.
      const ws = new WebSocket(`${proto}://${location.host}/api/v1/terminal/ws?${qs.toString()}`);
      ws.binaryType = "arraybuffer";
      state.term.ws = ws;
      setStatus(false, "connecting…");
      document.getElementById("termMeta").textContent = `${machine} as ${user}`;

      ws.onopen = () => {
        state.term.connected = true;
        setStatus(true, "connected");
        term.focus();
        onResize();
        toast("Terminal connected", "ok");
      };
      ws.onmessage = (ev) => {
        if (ev.data instanceof ArrayBuffer) {
          term.write(new Uint8Array(ev.data));
        } else if (typeof ev.data === "string") {
          term.write(ev.data);
        } else if (ev.data instanceof Blob) {
          ev.data.arrayBuffer().then((buf) => term.write(new Uint8Array(buf)));
        }
      };
      ws.onclose = () => {
        if (state.term.ws === ws) state.term.ws = null;
        state.term.connected = false;
        setStatus(false, "disconnected");
      };
      ws.onerror = () => {
        setStatus(false, "error");
        toast("WebSocket error", "error");
      };
    };

    document.getElementById("termDisconnect").onclick = () => {
      if (state.term.ws) state.term.ws.close();
      setStatus(false, "disconnected");
    };
  }

  /* ── Files ── */
  function joinPath(base, name) {
    if (!base || base === "/") return "/" + name.replace(/^\//, "");
    return base.replace(/\/$/, "") + "/" + name;
  }

  function parentPath(p) {
    if (!p || p === "/") return "/";
    const parts = p.replace(/\/$/, "").split("/");
    parts.pop();
    return parts.join("/") || "/";
  }

  async function renderFiles(root) {

        const q = new URLSearchParams({
          machine: state.files.machine,
          path: state.files.path,
          user: state.files.user,

        if (data.raw && !data.entries) {
          box.innerHTML = `<pre class="code">${esc(data.raw)}</pre>`;
          return;
        }
        if (data.error) {
          box.innerHTML = `<div class="err">${esc(data.error)}</div>`;
          return;

        if (!entries.length) {
          box.innerHTML = `<div class="empty">Empty directory.</div>`;

        box.innerHTML = `<table><thead><tr><th>Name</th><th>Size</th><th>Modified</th><th></th></tr></thead>

        box.querySelectorAll(".file-row-name").forEach((el) => {

              document.getElementById("filePath").value = el.dataset.path;
              loadList();
            }
          };
        });
        box.querySelectorAll("[data-dl]").forEach((btn) => {
          btn.onclick = async () => {
            syncState();
            const q = new URLSearchParams({
              machine: state.files.machine,
              path: btn.dataset.dl,
              user: state.files.user,
            });
            try {
              const res = await apiRaw("/files/download?" + q.toString());
              if (!res.ok) throw new Error("download failed");
              const blob = await res.blob();
              const a = document.createElement("a");
              a.href = URL.createObjectURL(blob);
              a.download = btn.dataset.dl.split("/").pop() || "download";
              a.click();

            syncState();
            const q = new URLSearchParams({
              machine: state.files.machine,
              path: btn.dataset.rm,

              loadList();

          };
        });

        box.innerHTML = `<div class="err">${esc(e.message)}</div>`;
      }
    }

    document.getElementById("fileRefresh").onclick = loadList;
    document.getElementById("fileGo").onclick = loadList;
    document.getElementById("fileUp").onclick = () => {
      document.getElementById("filePath").value = parentPath(document.getElementById("filePath").value);
      loadList();
    };
    document.getElementById("fileMachine").onchange = loadList;
    document.getElementById("fileMkdir").onclick = async () => {
      const name = prompt("Folder name");
      if (!name) return;
      syncState();
      const path = joinPath(state.files.path, name);

          method: "POST",

        loadList();
      } catch (e) { toast(e.message, "error"); }
    };
    document.getElementById("fileUpload").onchange = async (ev) => {
      const file = ev.target.files && ev.target.files[0];
      if (!file) return;
      syncState();
      const path = joinPath(state.files.path, file.name);
      const fd = new FormData();
      fd.append("machine", state.files.machine);
      fd.append("path", path);
      fd.append("user", state.files.user);
      fd.append("file", file);
      try {
        await api("/files/upload", { method: "POST", body: fd });
        toast("Uploaded " + file.name, "ok");
        loadList();
      } catch (e) { toast(e.message, "error"); }
      ev.target.value = "";
    };

    if (machines.length) loadList();
    else document.getElementById("fileList").innerHTML = `<div class="empty">No machines available.</div>`;
  }

            </tr>`;
          }).join("")}</tbody></table>` : `<div class="empty">No agents connected.</div>`}
      </div>
      <div class="card">
        <h3>All machines</h3>
        <table><thead><tr><th>Name</th><th>Host</th><th>Tunnel</th></tr></thead>
        <tbody>${machines.map((m) => `<tr>
          <td>${esc(m.name)}</td>
          <td class="mono">${esc(m.hostname)}:${esc(m.port)}</td>
          <td>${connectedSet.has(m.id) || connectedSet.has(m.name) ? badge("online") : badge("offline")}</td>
        </tr>`).join("") || `<tr><td colspan="3" class="muted">No machines</td></tr>`}</tbody></table>
      </div>`;
    document.getElementById("agentRefresh").onclick = () => render();
  }

  /* ── Audit ── */
  async function renderAudit(root) {
    let logs = [];
    try { logs = (await api("/audit-logs?limit=200")) || []; } catch (e) {
      root.innerHTML = `<div class="page-head"><div><h1>Audit</h1></div></div>
        <div class="card"><div class="err">${esc(e.message)}</div></div>`;
      return;
    }
    let users = [];
    try { users = (await api("/users")) || []; } catch (_) { users = []; }
    const userName = (id) => {
      if (!id) return "—";
      const u = users.find((x) => x.id === id);
      return u ? u.username : shortId(id);
    };
    const metaStr = (m) => {
      if (!m || typeof m !== "object") return "—";
      try { return JSON.stringify(m); } catch { return String(m); }
    };

    root.innerHTML = `
      <div class="page-head">
        <div>
          <h1>Audit</h1>
          <p>Trail of privileged actions (grants, user/machine changes, recording playback).</p>
        </div>
        <button type="button" class="btn secondary sm" id="auditRefresh">Refresh</button>
      </div>
      <div class="card">
        ${logs.length ? `<table><thead><tr>
          <th>Time</th><th>Actor</th><th>Action</th><th>Resource</th><th>IP</th><th>Details</th>
        </tr></thead><tbody>${logs.map((l) => `<tr>
          <td class="mono">${esc(fmtTime(l.timestamp))}</td>
          <td>${esc(userName(l.user_id))}</td>
          <td><strong>${esc(l.action)}</strong></td>
          <td class="mono">${esc(l.resource)}</td>
          <td class="mono">${esc(l.ip_address || "—")}</td>
          <td><span class="meta-chip" title="${esc(metaStr(l.metadata))}">${esc(metaStr(l.metadata))}</span></td>
        </tr>`).join("")}</tbody></table>` : `<div class="empty">No audit entries yet. Admin actions and session playback will appear here.</div>`}
      </div>`;
    document.getElementById("auditRefresh").onclick = () => render();
  }

  /* ── Security ── */
  async function renderSecurity(root) {
    root.innerHTML = `
      <div class="page-head">
        <div>
          <h1>Security</h1>
          <p>MFA, WebAuthn authenticators, and SSH public keys.</p>
        </div>
      </div>
      <div class="tabs">
        <button type="button" data-tab="mfa" class="${state.secTab === "mfa" ? "active" : ""}">TOTP / MFA</button>
        <button type="button" data-tab="webauthn" class="${state.secTab === "webauthn" ? "active" : ""}">WebAuthn</button>
        <button type="button" data-tab="ssh" class="${state.secTab === "ssh" ? "active" : ""}">SSH keys</button>
      </div>
      <div id="secBody"></div>`;

    root.querySelectorAll(".tabs button").forEach((btn) => {
      btn.onclick = () => {
        state.secTab = btn.dataset.tab;
        renderSecurity(root);
      };
    });

    const body = document.getElementById("secBody");
    if (state.secTab === "mfa") await renderMFAPanel(body);
    else if (state.secTab === "webauthn") await renderWebAuthnPanel(body);
    else await renderSSHKeysPanel(body);
  }

  async function renderMFAPanel(body) {
    const st = await api("/mfa/status");
    body.innerHTML = `
      <div class="card">
        <h3>Time-based one-time passwords</h3>
        <p>Status: ${st.mfa_enabled ? badge("enabled") : badge("off")}
          ${st.mfa_required ? `<span class="muted"> · organization requires MFA</span>` : ""}</p>
        <div class="row" style="margin-top:.75rem">
          <button type="button" class="btn" id="mfaEnroll" ${st.mfa_enabled ? "disabled" : ""}>Enroll TOTP</button>
          <button type="button" class="btn danger" id="mfaDisable" ${st.mfa_enabled ? "" : "disabled"}>Disable MFA</button>
        </div>
        <div id="mfaOut"></div>
      </div>`;

    document.getElementById("mfaEnroll").onclick = async () => {
      const out = document.getElementById("mfaOut");
      try {
        const data = await api("/mfa/enroll", { method: "POST", body: "{}" });
        out.innerHTML = `
          <p class="okmsg">Scan the otpauth URL in your authenticator, then confirm with a code.</p>
          <label class="field">Secret</label>
          <input class="mono" readonly value="${esc(data.secret)}" />
          <label class="field">otpauth URL</label>
          <textarea class="mono" rows="2" readonly>${esc(data.otpauth_url)}</textarea>
          <label class="field">Backup codes — save these</label>
          <pre class="session">${esc((data.backup_codes || []).join("\n"))}</pre>
          <label class="field">Confirm code</label>
          <input id="mfaConfirmCode" autocomplete="one-time-code" />
          <button type="button" class="btn" id="mfaConfirmBtn">Confirm enrollment</button>
          <div id="mfaMsg"></div>`;
        document.getElementById("mfaConfirmBtn").onclick = async () => {
          try {
            await api("/mfa/confirm", {
              method: "POST",
              body: JSON.stringify({ code: document.getElementById("mfaConfirmCode").value.trim() }),
            });
            document.getElementById("mfaMsg").innerHTML = `<p class="okmsg">MFA enabled.</p>`;
            toast("MFA enabled", "ok");
            render();
          } catch (e) {
            document.getElementById("mfaMsg").innerHTML = `<p class="err">${esc(e.message)}</p>`;
          }
        };
      } catch (e) {
        out.innerHTML = `<p class="err">${esc(e.message)}</p>`;
      }
    };

    document.getElementById("mfaDisable").onclick = async () => {
      const code = prompt("Enter TOTP or backup code to disable MFA");
      if (!code) return;
      try {
        await api("/mfa/disable", { method: "POST", body: JSON.stringify({ code }) });
        toast("MFA disabled", "ok");
        render();
      } catch (e) { toast(e.message, "error"); }
    };
  }

  async function renderWebAuthnPanel(body) {
    let creds = [];
    try { creds = (await api("/webauthn/credentials")) || []; } catch (e) {
      body.innerHTML = `<div class="card"><div class="err">${esc(e.message)}</div>
        <p class="muted">WebAuthn may be disabled on this server.</p></div>`;
      return;
    }

    body.innerHTML = `
      <div class="card">
        <h3>Registered authenticators</h3>
        <div class="row" style="margin-bottom:.85rem">
          <button type="button" class="btn teal" id="waRegister">Register YubiKey / FIDO2</button>
        </div>
        <div id="waMsg"></div>
        ${creds.length ? `<table><thead><tr><th>Name</th><th>Credential</th><th>Created</th><th></th></tr></thead>
          <tbody>${creds.map((c) => `<tr>
            <td>${esc(c.name)}</td>
            <td class="mono">${esc((c.cred_id || "").slice(0, 16))}…</td>
            <td class="mono">${esc(fmtTime(c.created_at))}</td>
            <td><button type="button" class="btn danger sm" data-wa-del="${esc(c.id)}">Delete</button></td>
          </tr>`).join("")}</tbody></table>` : `<div class="empty">No WebAuthn credentials yet.</div>`}
      </div>`;

    document.getElementById("waRegister").onclick = async () => {
      const msg = document.getElementById("waMsg");
      msg.innerHTML = "";
      try {
        const begin = await api("/webauthn/register/begin", { method: "POST", body: "{}" });
        const publicKey = preparePublicKeyOptions(begin.publicKey || begin);
        const cred = await navigator.credentials.create({ publicKey });
        const json = publicKeyCredentialToJSON(cred);
        await api("/webauthn/register/finish", {
          method: "POST",
          body: JSON.stringify(json),
        });
        toast("Authenticator registered", "ok");
        render();
      } catch (e) {
        msg.innerHTML = `<p class="err">${esc(e.message)}</p>`;
      }
    };

    body.querySelectorAll("[data-wa-del]").forEach((btn) => {
      btn.onclick = async () => {
        if (!confirm("Remove this authenticator?")) return;
        try {
          await api("/webauthn/credentials/" + encodeURIComponent(btn.dataset.waDel), { method: "DELETE" });
          toast("Credential removed", "ok");
          render();
        } catch (e) { toast(e.message, "error"); }
      };
    });
  }

  async function renderSSHKeysPanel(body) {
    let keys = [];
    try { keys = (await api("/ssh-keys")) || []; } catch (e) {
      body.innerHTML = `<div class="card"><div class="err">${esc(e.message)}</div></div>`;
      return;
    }

    body.innerHTML = `
      <div class="card">
        <h3>SSH public keys</h3>
        <p class="muted" style="margin-top:0">Supports classic and FIDO/sk-* key types.</p>
        <label class="field">Name</label>
        <input id="sshKeyName" placeholder="laptop, yubikey-work…" />
        <label class="field">Public key</label>
        <textarea id="sshKeyPub" rows="3" placeholder="ssh-ed25519 AAAA… or sk-ssh-ed25519@openssh.com AAAA…"></textarea>
        <button type="button" class="btn" id="sshKeyAdd">Add key</button>
        <div id="sshKeyMsg"></div>
      </div>
      <div class="card">
        <h3>Your keys</h3>
        ${keys.length ? `<table><thead><tr><th>Name</th><th>Type</th><th>Fingerprint</th><th>Created</th><th></th></tr></thead>
          <tbody>${keys.map((k) => `<tr>
            <td>${esc(k.name)}</td>
            <td class="mono">${esc(k.key_type)}</td>
            <td class="mono" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(k.public_key)}">${esc((k.public_key || "").split(" ").slice(0, 2).join(" ").slice(0, 48))}…</td>
            <td class="mono">${esc(fmtTime(k.created_at))}</td>
            <td><button type="button" class="btn danger sm" data-ssh-del="${esc(k.id)}">Delete</button></td>
          </tr>`).join("")}</tbody></table>` : `<div class="empty">No SSH keys stored.</div>`}
      </div>`;

    document.getElementById("sshKeyAdd").onclick = async () => {
      const msg = document.getElementById("sshKeyMsg");
      msg.innerHTML = "";
      try {
        await api("/ssh-keys", {
          method: "POST",
          body: JSON.stringify({
            name: document.getElementById("sshKeyName").value.trim(),
            public_key: document.getElementById("sshKeyPub").value.trim(),
          }),
        });
        toast("SSH key added", "ok");
        render();
      } catch (e) {
        msg.innerHTML = `<p class="err">${esc(e.message)}</p>`;
      }
    };

    body.querySelectorAll("[data-ssh-del]").forEach((btn) => {
      btn.onclick = async () => {
        if (!confirm("Delete this SSH key?")) return;
        try {
          await api("/ssh-keys/" + encodeURIComponent(btn.dataset.sshDel), { method: "DELETE" });
          toast("SSH key deleted", "ok");
          render();
        } catch (e) { toast(e.message, "error"); }
      };
    });
  }

  /* ── Init ── */
  (async function init() {
    if (state.token) setSessionCookie(state.token);
    if (!state.token) {
      showLogin();
      return;
    }
    try {
      await refreshMe();
      state.view = defaultViewForRole(roleOf(state.user));
      showApp();
    } catch {
      clearAuth();
      showLogin();
    }
  })();
})();
</script>
</body>
</html>
