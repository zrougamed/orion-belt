services:
  postgres:
    image: postgres:16-alpine
    container_name: orion-belt-postgres
    environment:
      POSTGRES_USER: orionbelt
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orionbelt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orionbelt"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orion-belt

  server:
    image: mohamedzrouga/orion-belt:v0.3.0
    container_name: orion-belt-server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "2222:2222"
      - "8080:8080"
    volumes:
      - ./config/server.yaml:/config/config.yaml:ro
      - recordings:/var/lib/orion-belt/recordings
      - ssh_host_key:/etc/orion-belt
      - ./logs:/var/log/orion-belt
    environment:
      - ORION_DB_CONNECTION=postgres://orionbelt:password@postgres:5432/orionbelt?sslmode=disable
    networks:
      - orion-belt
    restart: unless-stopped

volumes:
  postgres_data:
  recordings:
  ssh_host_key:

networks:
  orion-belt:
    driver: bridge