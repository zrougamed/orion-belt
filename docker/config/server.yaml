server:
  host: "0.0.0.0"
  port: 2222
  api_port: 8080
  ssh_host_key: "/etc/orion-belt/ssh_host_key"
  api_endpoint: "http://localhost:8080/api"
  plugin_dir: "/etc/orion-belt/plugins"
  metrics_enabled: true

database:
  driver: "postgres"
  connection_string: "postgres://orionbelt:password@postgres:5432/orionbelt?sslmode=disable"

auth:
  rebac_enabled: true
  allow_temp_access: true
  jwt_secret: "dev-only-change-me"
  jwt_expiry_hours: 24
  mfa_required: false

recording:
  enabled: true
  storage_path: "/var/lib/orion-belt/recordings"
  retention_days: 90
  encryption_key: ""

plugins:
  audit-logger:
    log_path: "/var/log/orion-belt/audit.log"
  
  slack-notifications:
    webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK"
    channel: "#security"
    enabled: false

  email-notifications:
    smtp_host: "smtp.example.com"
    smtp_port: 587
    from: "orion-belt@example.com"
    to:
      - "admins@example.com"
    enabled: false

  webhook-notifications:
    url: "https://hooks.example.com/orion-belt"
    enabled: false
