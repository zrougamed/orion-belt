server:
  host: "0.0.0.0"
  port: 2222
  api_port: 8080
  ssh_host_key: "/etc/orion-belt/ssh_host_key"
  api_endpoint: "http://localhost:8080/api"
  metrics_enabled: true

database:
  driver: "postgres"
  connection_string: "postgres://orionbelt:password@postgres:5432/orionbelt?sslmode=disable"

auth:
  rebac_enabled: true
  allow_temp_access: true
  jwt_secret: "lab-only-change-me"
  jwt_expiry_hours: 24
  mfa_required: false
  rate_limit_per_minute: 600
  strict_host_key_checking: "no"
  webauthn:
    enabled: true
    rp_display_name: "Orion Belt Lab"
    rp_id: "localhost"
    origins:
      - "http://localhost:8080"
      - "https://localhost:8080"

recording:
  enabled: true
  storage_path: "/var/lib/orion-belt/recordings"
  retention_days: 7
  encryption_key: ""
